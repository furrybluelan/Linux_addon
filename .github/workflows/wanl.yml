name: Build RTL8812AU for OnePlus Ace 2
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential libelf-dev libssl-dev flex bison

      - name: Setup Toolchain (Android Clang)
        run: |
          # 下载预编译的 Android Clang 编译器，对齐 AOSP 编译环境
          mkdir -p $GITHUB_WORKSPACE/toolchain
          cd $GITHUB_WORKSPACE/toolchain
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r450784d.tar.gz
          tar -xf clang-r450784d.tar.gz

      - name: Fetch Kernel Source & Driver
        run: |
          # 拉取一加 Ace 2 (sm8475) 源码
          git clone --depth 1 https://github.com/OnePlusOSS/android_kernel_oneplus_sm8475.git -b oneplus/sm8475_u_14.0.0 kernel
          # 拉取网卡驱动源码
          git clone --depth 1 https://github.com/aircrack-ng/rtl8812au.git driver

      - name: Align Version & Config
        run: |
          cd kernel
          # 关键：根据你的 uname -a 强制对齐版本后缀
          # 你的版本是 5.10.117-android12-9-g287b9af3dd02
          sed -i 's/SUBLEVEL =.*/SUBLEVEL = 117/' Makefile
          # 这里填入 "-" 后面剩余的字符串
          echo "CONFIG_LOCALVERSION=\"-android12-9-g287b9af3dd02\"" >> ../config
          cp ../config .config
          
          # 准备内核开发环境
          export PATH=$GITHUB_WORKSPACE/toolchain/bin:$PATH
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 modules_prepare

      - name: Build Module
        run: |
          export PATH=$GITHUB_WORKSPACE/toolchain/bin:$PATH
          cd driver
          # 编译驱动，指定内核源码路径
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 \
               KSRC=$GITHUB_WORKSPACE/kernel \
               USER_MODULE_NAME=8812au -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 8812au-ko
          path: driver/8812au.ko
