name: Build RTL8812AU Manual

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Toolchain (AArch64)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu clang lld llvm bc build-essential libelf-dev libssl-dev flex bison
          echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "ARCH=arm64" >> $GITHUB_ENV

      - name: Fetch Kernel Source & Driver
        run: |
          # 1. 拉取内核源码，并尝试初始化可能缺失的子模块
          git clone --depth 1 https://github.com/OnePlusOSS/android_kernel_oneplus_sm8475.git kernel
          cd kernel
          # 尝试同步子模块（防止 Kconfig 找不到文件）
          git submodule update --init --recursive || true
          
          # 2. 拉取网卡驱动
          cd ..
          git clone --depth 1 https://github.com/aircrack-ng/rtl8812au.git driver

      - name: Align Version & Config
        run: |
          cd kernel
          # 1. 对齐内核主版本号 (根据截图是 5.10.117)
          sed -i 's/SUBLEVEL =.*/SUBLEVEL = 117/' Makefile
          
          # 2. 修改 config 文件以匹配后缀 -android12-9-g287b9af3dd02
          sed -i '/CONFIG_LOCALVERSION=/d' ../config
          echo 'CONFIG_LOCALVERSION="-android12-9-g287b9af3dd02"' >> ../config
          
          # 3. 复制配置
          cp ../config .config
          
          # 4. 解决 Kconfig 报错的核心逻辑：自动修正不匹配的配置项
          # 使用 olddefconfig 会自动将源码中不存在的功能设为默认(n)，从而避免编译中断
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 olddefconfig
          
          # 5. 准备环境
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 modules_prepare

      - name: Build Module
        run: |
          cd driver
          # 编译驱动，禁用一些可能导致报错的警告
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 LLVM_IAS=1 \
               KSRC=$GITHUB_WORKSPACE/kernel \
               USER_MODULE_NAME=8812au -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 8812au-ko-package
          path: driver/8812au.ko
