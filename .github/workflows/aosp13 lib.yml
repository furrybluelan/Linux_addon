name: Build All Four Core Libs (Full Fix v10)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout util-linux
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext bison flex autopoint build-essential pkg-config libtool autoconf automake

      - name: Pre-build Source Surgery
        run: |
          # 1. 彻底禁用 libmount 的符号版本脚本，这是解决图 3460 报错的关键
          # 我们直接把 .sym 文件清空，让它没有要强制检查的符号
          find . -name "*.sym" -exec truncate -s 0 {} +
          
          # 2. 物理移除 monitor_fanotify.c 依赖并清空内容 (修复图 3459)
          echo "/* Cleaned for Android */" > libmount/src/monitor_fanotify.c
          # 注入空实现以满足内部引用
          cat <<EOF >> libmount/src/monitor_fanotify.c
          int mnt_monitor_enable_fanotify(void *mn, int enable) { return -1; }
          int mnt_monitor_get_fanotify_fd(void *mn) { return -1; }
          EOF

          # 3. 修复 versionsort 和 shells 符号 (修复图 3447, 3454, 3456)
          sed -i 's/versionsort/alphasort/g' libmount/src/tab_parse.c
          cat <<EOF >> lib/strutils.c
          #include <string.h>
          int strverscmp(const char *s1, const char *s2) { return strcmp(s1, s2); }
          void setusershell(void) {}
          void endusershell(void) {}
          char *getusershell(void) { return (char *)0; }
          EOF

      - name: Build Core Libraries
        run: |
          ./autogen.sh
          
          export TOOLCHAIN=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android33
          export CC=$TOOLCHAIN/bin/$TARGET-clang
          export STRIP=$TOOLCHAIN/bin/llvm-strip

          export CFLAGS="-Wno-implicit-function-declaration -Wno-int-conversion"
          # 增加 --undefined-version 告诉链接器忽略版本脚本中的缺失符号
          export LDFLAGS="-Wl,-rpath=/system/lib64 -Wl,--dynamic-linker=/system/bin/linker64 -Wl,--allow-shlib-undefined -Wl,--undefined-version"

          ./configure --host=aarch64-linux-android \
                      --prefix=/system \
                      --enable-shared \
                      --disable-static \
                      --disable-all-programs \
                      --enable-libuuid \
                      --enable-libblkid \
                      --enable-libmount \
                      --enable-libsmartcols \
                      --disable-bash-completion \
                      --without-python \
                      --without-udev \
                      --without-ncurses \
                      --disable-libmount-mountfd-support \
                      --disable-monitor-fanotify \
                      --disable-monitor-utab

          # 移除 Makefile 中所有指向符号脚本的参数，双重保险
          find . -name "Makefile" -exec sed -i 's/--version-script//g' {} +

          make -j$(nproc)

          # --- 提取产物 ---
          mkdir -p output/lib64
          for lib in uuid blkid mount smartcols; do
            cp .libs/lib${lib}.so output/lib64/
            ln -sf lib${lib}.so output/lib64/lib${lib}.so.1
          done
          
          cp .libs/lsblk output/
          find output/lib64/ -type f -name "*.so" -exec $STRIP --strip-unneeded {} +
          $STRIP output/lsblk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: util-linux-libs-v10-final
          path: output/
