name: Build Single Binary Vim

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu make git wget

      - name: Build Ncurses (Static)
        run: |
          wget https://invisible-mirror.net/archives/ncurses/ncurses-6.5.tar.gz
          tar -xf ncurses-6.5.tar.gz
          cd ncurses-6.5
          ./configure --host=aarch64-linux-gnu --with-shared=no --enable-static --enable-widec --without-debug CPPFLAGS="-P"
          make -j$(nproc)
          # 仅提取库文件供 Vim 链接
          mkdir -p ../dist/lib ../dist/include
          cp lib/libncursesw.a ../dist/lib/
          cp include/*.h ../dist/include/

      - name: Build Vim (Standalone Binary)
        run: |
          git clone --depth 1 https://github.com/vim/vim.git
          cd vim/src
          # 关键：使用 --with-features=small 减少对外部 runtime 的依赖
          ./configure --host=aarch64-linux-gnu \
                      CC=aarch64-linux-gnu-gcc \
                      --with-tlib=ncursesw --enable-gui=no --with-features=small \
                      cross_compiling=yes \
                      ac_cv_sizeof_int=4 ac_cv_sizeof_long=8 ac_cv_sizeof_off_t=8 ac_cv_sizeof_voidp=8 \
                      CPPFLAGS="-I$(pwd)/../../dist/include" \
                      LDFLAGS="-static -L$(pwd)/../../dist/lib -Wl,-dynamic-linker,/system/bin/linker64" \
                      LIBS="-lncursesw"
          make -j$(nproc)
          # 极致压缩，删除所有调试符号
          aarch64-linux-gnu-strip vim

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: vim-standalone
          path: vim/src/vim
