name: Build Dynamic lsblk for Custom System Libs

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout util-linux
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config bison flex gettext autopoint \
            gcc-aarch64-linux-gnu

      - name: Configure and Build
        run: |
          ./autogen.sh
          
          export CC=aarch64-linux-gnu-gcc
          # 关键点：设置 RPATH 让程序去 /system/lib64 找库
          # 并且通过 LDFLAGS 允许未定义的符号在运行时解析
          export LDFLAGS="-Wl,-rpath=/system/lib64 -Wl,--dynamic-linker=/system/bin/linker64"

          ./configure \
            --host=aarch64-linux-gnu \
            --disable-all-programs \
            --enable-lsblk \
            --enable-libblkid \
            --enable-libmount \
            --enable-libsmartcols \
            --disable-static \
            --enable-shared \
            --without-udev \
            --without-ncurses \
            --without-python \
            --without-tinfo \
            --without-cap-ng \
            --disable-bash-completion \
            --disable-nls

          # 我们只需要 lsblk 程序本身
          make lsblk -j$(nproc)
          
          # 瘦身
          aarch64-linux-gnu-strip lsblk

      - name: Verify Linkage
        run: |
          # 检查动态链接依赖
          aarch64-linux-gnu-readelf -d lsblk | grep NEEDED

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsblk-android-dynamic
          path: lsblk
