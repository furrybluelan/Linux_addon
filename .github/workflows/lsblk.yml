name: Build NDK-Native lsblk (Final Fix v4)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout util-linux
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config bison flex gettext autopoint

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Patch NDK Compatibility
        run: |
          # 1. 修复 getusershell (图 3446)
          sed -i '1i #define getusershell() (NULL)\n#define endusershell() ((void)0)' lib/shells.c
          
          # 2. 修复 versionsort (图 3447)
          sed -i 's/versionsort/alphasort/g' libmount/src/tab_parse.c

          # 3. 修复 fanotify 链接错误 (图 3450)
          cat <<EOF > libmount/src/monitor_fanotify.c
          #include <stdlib.h>
          int mnt_monitor_enable_fanotify(struct libmnt_monitor *mn __attribute__((__unused__)), 
                                         int enable __attribute__((__unused__))) {
              return -1; 
          }
          EOF

      - name: Configure and Build
        run: |
          ./autogen.sh
          
          export TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android
          export API=29
          
          export CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
          # 强制禁用 NCURSES 相关的环境变量，防止检测到系统自带的库
          export NCURSES_CFLAGS=" "
          export NCURSES_LIBS=" "
          
          export CFLAGS="-Wno-implicit-function-declaration -Wno-int-conversion"
          export LDFLAGS="-Wl,-rpath=/system/lib64 -Wl,--dynamic-linker=/system/bin/linker64"

          ./configure \
            --host=$TARGET \
            --disable-all-programs \
            --enable-lsblk \
            --enable-libblkid \
            --enable-libmount \
            --enable-libsmartcols \
            --enable-shared \
            --disable-static \
            --without-udev \
            --without-ncurses \
            --without-ncursesw \
            --without-tinfo \
            --without-readline \
            --without-python \
            --disable-bash-completion \
            --disable-nls \
            --disable-widechar \
            --disable-libmount-mountfd-support \
            --disable-monitor-fanotify

          # 只编译我们需要的库和程序
          make lsblk -j$(nproc)
          
          # 提取真身
          cp .libs/lsblk lsblk
          $TOOLCHAIN/bin/llvm-strip lsblk

      - name: Check Dependencies
        run: |
          # 验证是否只链接到了 Android libc.so 且没有 tinfo
          readelf -d lsblk | grep NEEDED

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsblk-ndk-v4
          path: lsblk
