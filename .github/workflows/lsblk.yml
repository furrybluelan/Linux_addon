name: Build NDK-Native lsblk (Ultimate Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout util-linux
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config bison flex gettext autopoint

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Patch NDK Missing Functions
        run: |
          # 修复 getusershell/endusershell (图 3446 报错)
          sed -i '1i #define getusershell() (NULL)\n#define endusershell() ((void)0)' lib/shells.c
          
          # 修复 versionsort 缺失 (图 3447 报错)
          # 在 libmount/src/tab_parse.c 中将 versionsort 替换为通用的 alphasort
          sed -i 's/versionsort/alphasort/g' libmount/src/tab_parse.c

      - name: Configure and Build
        run: |
          ./autogen.sh
          
          export TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android
          export API=29
          
          export CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
          # 增加编译选项以允许忽略这些非致命的符号差异
          export CFLAGS="-Wno-implicit-function-declaration -Wno-int-conversion"
          export LDFLAGS="-Wl,-rpath=/system/lib64 -Wl,--dynamic-linker=/system/bin/linker64"

          ./configure \
            --host=$TARGET \
            --disable-all-programs \
            --enable-lsblk \
            --enable-libblkid \
            --enable-libmount \
            --enable-libsmartcols \
            --enable-shared \
            --disable-static \
            --without-udev \
            --without-ncurses \
            --without-python \
            --disable-bash-completion \
            --disable-nls

          make lsblk -j$(nproc)
          
          # 提取 ELF 真身并瘦身
          cp .libs/lsblk lsblk
          $TOOLCHAIN/bin/llvm-strip lsblk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsblk-ndk-final
          path: lsblk
