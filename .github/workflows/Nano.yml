name: Ultimate Nano 8.2 Full (Official Toolchain)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Official Musl Toolchain
        run: |
          sudo apt-get update
          # 直接安装官方仓库里的 musl 交叉编译器，解决 1000002289 的下载超时
          sudo apt-get install -y musl-tools musl-dev gcc-aarch64-linux-gnu

      - name: Build Ncurses 6.5 (Wide-character Static)
        run: |
          wget https://invisible-mirror.net/archives/ncurses/ncurses-6.5.tar.gz
          tar -xf ncurses-6.5.tar.gz
          cd ncurses-6.5
          # 使用 aarch64 交叉编译器配合 musl 标志
          ./configure --host=aarch64-linux-gnu \
                      CC="aarch64-linux-gnu-gcc -static" \
                      --with-shared=no --enable-static --enable-widec \
                      --without-debug --prefix=$(pwd)/dist
          make -j$(nproc)
          make install

      - name: Build Nano 8.2 (Standalone Full)
        run: |
          wget https://www.nano-editor.org/dist/v8/nano-8.2.tar.gz
          tar -xf nano-8.2.tar.gz
          cd nano-8.2
          # 增加 --disable-libmagic 以减少不必要的静态链接复杂性
          # 强制禁用 pwd 函数以修复 1000002287 和 1000002288 的链接报错
          ./configure --host=aarch64-linux-gnu \
                      CC="aarch64-linux-gnu-gcc -static" \
                      --enable-utf8 --enable-color --enable-extra --enable-nanorc \
                      --disable-nls --disable-libmagic \
                      ac_cv_func_getpwuid=no ac_cv_func_getpwnam=no ac_cv_func_getpwent=no \
                      cross_compiling=yes \
                      CPPFLAGS="-I$(pwd)/../ncurses-6.5/dist/include -I$(pwd)/../ncurses-6.5/dist/include/ncursesw" \
                      LDFLAGS="-static -L$(pwd)/../ncurses-6.5/dist/lib" \
                      LIBS="-lncursesw"
          make -j$(nproc)
          aarch64-linux-gnu-strip src/nano

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: nano-8.2-standalone
          path: nano-8.2/src/nano
