name: Build static nano binary for Android (arm64) with TLS fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y make wget curl binutils

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip android-ndk-r25c-linux.zip
          echo "NDK_PATH=${PWD}/android-ndk-r25c" >> $GITHUB_ENV

      - name: Set up NDK environment
        run: |
          TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
          TARGET=aarch64-linux-android
          API=21
          BIN_DIR=$TOOLCHAIN/bin
          echo "$BIN_DIR" >> $GITHUB_PATH
          echo "CC=$BIN_DIR/clang -target $TARGET$API" >> $GITHUB_ENV
          echo "CXX=$BIN_DIR/clang++ -target $TARGET$API" >> $GITHUB_ENV
          echo "AR=$BIN_DIR/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB=$BIN_DIR/llvm-ranlib" >> $GITHUB_ENV
          echo "STRIP=$BIN_DIR/llvm-strip" >> $GITHUB_ENV
          echo "TARGET=$TARGET" >> $GITHUB_ENV
          echo "API=$API" >> $GITHUB_ENV

      # --- 获取最新 ncurses 版本 ---
      - name: Get latest ncurses version
        id: ncurses
        run: |
          LATEST=$(curl -s ftp://ftp.gnu.org/gnu/ncurses/ | grep -oP 'ncurses-\K[0-9]+\.[0-9]+' | sort -V | tail -n1)
          echo "version=${LATEST:-6.5}" >> $GITHUB_OUTPUT
          echo "url=ftp://ftp.gnu.org/gnu/ncurses/ncurses-$LATEST.tar.gz" >> $GITHUB_OUTPUT

      # --- 获取最新 nano 版本 ---
      - name: Get latest nano version
        id: nano
        run: |
          HTML=$(curl -s https://www.nano-editor.org/download.php)
          LATEST=$(echo "$HTML" | grep -oP 'nano-\K[0-9]+\.[0-9]+(?=\.tar\.xz)' | head -1)
          if [ -z "$LATEST" ]; then
            MAJOR=$(curl -s https://www.nano-editor.org/dist/ | grep -oP 'v\K[0-9]+' | sort -n | tail -1)
            if [ -n "$MAJOR" ]; then
              LATEST=$(curl -s https://www.nano-editor.org/dist/v$MAJOR/ | grep -oP "nano-$MAJOR\.[0-9]+\.tar\.xz" | grep -oP "nano-\K[0-9]+\.[0-9]+" | sort -V | tail -1)
            fi
          fi
          echo "version=${LATEST:-8.3}" >> $GITHUB_OUTPUT
          echo "url=https://www.nano-editor.org/dist/v${LATEST%%.*}/nano-$LATEST.tar.xz" >> $GITHUB_OUTPUT

      # --- 编译 ncurses（静态）---
      - name: Download and build ncurses (static)
        run: |
          wget "${{ steps.ncurses.outputs.url }}"
          tar xf ncurses-*.tar.gz
          SRC_DIR=$(tar tf ncurses-*.tar.gz | head -1 | cut -d/ -f1)
          cd $SRC_DIR
          ./configure \
            --host=$TARGET \
            --prefix=$PWD/install \
            --without-shared \
            --with-normal \
            --without-debug \
            --without-ada \
            --enable-widec \
            --enable-termcap \
            CFLAGS="-fPIE"
          make -j$(nproc)
          make install.libs
          echo "NCURSES_DIR=$PWD/install" >> $GITHUB_ENV

      # --- 检测 ncurses 库名 ---
      - name: Detect ncurses library name
        run: |
          if [ -f "$NCURSES_DIR/lib/libncursesw.a" ]; then
            echo "NCURSES_LIB_NAME=ncursesw" >> $GITHUB_ENV
            echo "NCURSES_LIB_PATH=$NCURSES_DIR/lib/libncursesw.a" >> $GITHUB_ENV
          elif [ -f "$NCURSES_DIR/lib/libncurses.a" ]; then
            echo "NCURSES_LIB_NAME=ncurses" >> $GITHUB_ENV
            echo "NCURSES_LIB_PATH=$NCURSES_DIR/lib/libncurses.a" >> $GITHUB_ENV
          else
            echo "ERROR: No ncurses static library found!"
            exit 1
          fi

      # --- 下载 nano 源码 ---
      - name: Download nano source
        run: |
          wget "${{ steps.nano.outputs.url }}"
          tar xf nano-*.tar.xz
          SRC_DIR=$(tar tf nano-*.tar.xz | head -1 | cut -d/ -f1)
          echo "NANO_SRC_DIR=$PWD/$SRC_DIR" >> $GITHUB_ENV

      # --- 配置 nano ---
      - name: Configure nano
        run: |
          cd $NANO_SRC_DIR
          export CPPFLAGS="-I$NCURSES_DIR/include -I$NCURSES_DIR/include/ncursesw"
          export LIBS="$NCURSES_LIB_PATH -lm"
          export CFLAGS="-fPIE -O2"
          # 交叉编译必需的缓存变量
          export ac_cv_func_setenv=yes
          export ac_cv_func_malloc_0_nonnull=yes
          export ac_cv_func_realloc_0_nonnull=yes
          ./configure \
            --host=$TARGET \
            --build=x86_64-linux-gnu \
            --prefix=$PWD/install \
            --disable-shared \
            --enable-static \
            --enable-utf8 \
            --disable-nls \
            --disable-speller

      # --- 编译 nano（静态链接 + TLS 对齐修复）---
      - name: Compile nano (static)
        run: |
          cd $NANO_SRC_DIR
          # 增强的链接器选项以强制 TLS 对齐
          EXTRA_LDFLAGS="-Wl,-z,max-page-size=0x1000 -Wl,-z,common-page-size=0x1000 -Wl,--no-rosegment -Wl,-z,separate-loadable-segments"
          make -j$(nproc) LDFLAGS="-L$NCURSES_DIR/lib -static -pie $EXTRA_LDFLAGS" LIBS="$NCURSES_LIB_PATH -lm"
          make install

      # --- 检查 TLS 段对齐（过滤警告）---
      - name: Check TLS alignment
        run: |
          cd $NANO_SRC_DIR/install/bin
          echo "=== Checking TLS segment alignment (warnings filtered) ==="
          # 显示 TLS 段相关信息，屏蔽 stderr 警告
          readelf -l nano 2>/dev/null | grep -A5 TLS || echo "No TLS segment found"
          # 提取对齐值
          ALIGN=$(readelf -l nano 2>/dev/null | grep -A5 TLS | grep -o '0x[0-9a-f]*$' | head -1)
          if [ -z "$ALIGN" ]; then
            echo "Could not determine TLS alignment."
          elif [ "$ALIGN" != "0x40" ]; then
            echo "⚠️  TLS alignment is $ALIGN, expected 0x40 (64). Binary may not run on Android!"
          else
            echo "✅ TLS alignment OK ($ALIGN)."
          fi

      # --- 打包二进制文件 ---
      - name: Package nano binary
        run: |
          mkdir -p output
          cp $NANO_SRC_DIR/install/bin/nano output/
          cd output
          $STRIP nano
          echo "=== Checking linked libraries (should only show system libs) ==="
          readelf -d nano 2>/dev/null | grep NEEDED || true
          tar -czf $GITHUB_WORKSPACE/nano-android-static.tar.gz nano

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nano-android-static
          path: nano-android-static.tar.gz
