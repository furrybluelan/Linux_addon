name: Build Static Bash (ARM64)
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
jobs:
  build:
    name: Build Bash (ARM64)
    runs-on: ubuntu-latest
    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu build-essential libncurses-dev:arm64 flex bison autoconf gettext wget file
      - name: Download latest Bash source
        run: |
          LATEST_VERSION=$(curl -s https://ftp.gnu.org/gnu/bash/ | grep -oP 'bash-\K[0-9]+\.[0-9]+(?=\.tar\.gz)' | sort -V | tail -1)
          echo "Latest Bash version: ${LATEST_VERSION}"
          wget "https://ftp.gnu.org/gnu/bash/bash-${LATEST_VERSION}.tar.gz"
          tar xzf "bash-${LATEST_VERSION}.tar.gz"
          cd bash-*
          echo "BASH_SRC_DIR=$(pwd)" >> $GITHUB_ENV
      - name: Configure and compile static bash
        run: |
          cd $BASH_SRC_DIR
          ./configure --host=aarch64-linux-gnu --enable-static-link --enable-alias --enable-arith-for-command --enable-array-variables --enable-bang-history --enable-brace-expansion --enable-casemod-attributes --enable-casemod-expansions --enable-command-timing --enable-cond-command --enable-cond-regexp --enable-coprocesses --enable-debugger --enable-directory-stack --enable-dparen-arithmetic --enable-extended-glob --enable-help-builtin --enable-history --enable-job-control --enable-multibyte --enable-net-redirections --enable-process-substitution --enable-progcomp --enable-prompt-string-decoding --enable-readline --enable-restricted --enable-select --enable-single-help-strings --enable-strict-posix-default --enable-translatable-strings --enable-usg-echo-default --enable-xpg-echo-default LDFLAGS="-static"
          make -j$(nproc)
          aarch64-linux-gnu-strip ./bash
          file ./bash | grep "statically linked" || { echo "Error: bash is not statically linked"; exit 1; }
          file ./bash | grep "ARM aarch64" || { echo "Error: bash is not built for ARM64"; exit 1; }
          chmod +x ./bash
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bash-static-arm64
          path: ${{ env.BASH_SRC_DIR }}/bash
          retention-days: 90
