name: Build static Vim binary for Android (arm64) only

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y make wget curl gettext

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip android-ndk-r25c-linux.zip
          echo "NDK_PATH=${PWD}/android-ndk-r25c" >> $GITHUB_ENV

      - name: Set up NDK environment
        run: |
          TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
          TARGET=aarch64-linux-android
          API=21
          BIN_DIR=$TOOLCHAIN/bin
          echo "$BIN_DIR" >> $GITHUB_PATH
          echo "CC=$BIN_DIR/clang -target $TARGET$API" >> $GITHUB_ENV
          echo "CXX=$BIN_DIR/clang++ -target $TARGET$API" >> $GITHUB_ENV
          echo "AR=$BIN_DIR/llvm-ar" >> $GITHUB_ENV
          echo "STRIP=$BIN_DIR/llvm-strip" >> $GITHUB_ENV
          echo "TARGET=$TARGET" >> $GITHUB_ENV

      # --- 获取最新版本 ---
      - name: Get latest ncurses version
        id: ncurses
        run: |
          LATEST=$(curl -s ftp://ftp.gnu.org/gnu/ncurses/ | grep -oP 'ncurses-\K[0-9]+\.[0-9]+' | sort -V | tail -n1)
          echo "version=${LATEST:-6.5}" >> $GITHUB_OUTPUT

      - name: Get latest Vim version
        id: vim
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/vim/vim/releases/latest | grep -oP '"tag_name": "\K[^"]+' || true)
          if [ -z "$LATEST_TAG" ]; then
            echo "GitHub API failed, using fallback version v9.1.0"
            LATEST_TAG="v9.1.0"
          fi
          VERSION=${LATEST_TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      # --- 编译 ncurses（静态）---
      - name: Download and build ncurses (static)
        run: |
          wget ftp://ftp.gnu.org/gnu/ncurses/ncurses-${{ steps.ncurses.outputs.version }}.tar.gz
          tar xf ncurses-*.tar.gz
          SRC_DIR=$(tar tf ncurses-*.tar.gz | head -1 | cut -d/ -f1)
          cd $SRC_DIR
          ./configure --host=$TARGET --prefix=$PWD/install \
                      --without-shared --with-normal \
                      --without-debug --without-ada \
                      --enable-widec --enable-termcap \
                      CFLAGS="-fPIE"
          make -j$(nproc)
          make install.libs
          echo "NCURSES_DIR=$PWD/install" >> $GITHUB_ENV

      # --- 检测 ncurses 库名并显示详细信息 ---
      - name: Detect ncurses library and debug
        run: |
          echo "=== NCURSES_DIR/lib contents ==="
          ls -la $NCURSES_DIR/lib
          echo "=== Searching for ncurses static library ==="
          if [ -f "$NCURSES_DIR/lib/libncursesw.a" ]; then
            echo "Found libncursesw.a"
            echo "NCURSES_LIB_NAME=ncursesw" >> $GITHUB_ENV
            echo "NCURSES_TLIB=ncursesw" >> $GITHUB_ENV
          elif [ -f "$NCURSES_DIR/lib/libncurses.a" ]; then
            echo "Found libncurses.a"
            echo "NCURSES_LIB_NAME=ncurses" >> $GITHUB_ENV
            echo "NCURSES_TLIB=ncurses" >> $GITHUB_ENV
          else
            echo "ERROR: No ncurses static library found!"
            exit 1
          fi
          echo "NCURSES_LIB_NAME=${NCURSES_LIB_NAME}" >> $GITHUB_ENV
          echo "NCURSES_TLIB=${NCURSES_TLIB}" >> $GITHUB_ENV

      # --- 下载 Vim 源码 ---
      - name: Download Vim source
        run: |
          git clone --branch ${{ steps.vim.outputs.tag }} --depth 1 https://github.com/vim/vim.git
          echo "VIM_SRC_DIR=$PWD/vim" >> $GITHUB_ENV

      # --- 配置 Vim（最小化静态编译）---
      - name: Configure Vim (minimal static)
        run: |
          cd $VIM_SRC_DIR/src
          export CPPFLAGS="-I$NCURSES_DIR/include -I$NCURSES_DIR/include/ncursesw"
          export LDFLAGS="-L$NCURSES_DIR/lib"
          export CFLAGS="-fPIE -O2"

          # 交叉编译必需的缓存变量
          export vim_cv_toupper_broken=no
          export vim_cv_memmove_handles_overlap=yes
          export vim_cv_stat_ignores_slash=no
          export vim_cv_terminfo=yes
          export vim_cv_tgetent=non-zero
          export vim_cv_getcwd_broken=no
          export vim_cv_ospeed_is_int=yes
          export ac_cv_sizeof_int=4

          ./configure \
            --host=$TARGET \
            --with-features=tiny \
            --disable-gui \
            --without-x \
            --disable-netbeans \
            --disable-channel \
            --disable-terminal \
            --disable-arabic \
            --disable-farsi \
            --disable-libsodium \
            --enable-multibyte \
            --with-tlib=$NCURSES_TLIB \
            --prefix=$PWD/install

      # --- 编译 Vim（静态链接）---
      - name: Compile Vim (static)
        run: |
          cd $VIM_SRC_DIR/src
          echo "=== Compile environment ==="
          echo "NCURSES_LIB_NAME = ${NCURSES_LIB_NAME}"
          echo "NCURSES_DIR/lib = ${NCURSES_DIR}/lib"
          echo "LDFLAGS = ${LDFLAGS}"
          echo "LIBS = -l${NCURSES_LIB_NAME}"
          echo "=== Checking library existence ==="
          ls -la ${NCURSES_DIR}/lib/lib${NCURSES_LIB_NAME}.a || echo "Library file missing!"
          echo "=== Running make ==="
          make -j$(nproc) LDFLAGS="$LDFLAGS -static -pie" LIBS="-l${NCURSES_LIB_NAME}"
          make install

      # --- 打包二进制文件 ---
      - name: Package vim binary
        run: |
          mkdir -p output
          cp $VIM_SRC_DIR/src/install/bin/vim output/
          cd output
          $STRIP vim
          echo "=== Checking linked libraries (should only show system libs) ==="
          readelf -d vim | grep NEEDED || true
          tar -czf $GITHUB_WORKSPACE/vim-android-binary-only.tar.gz vim

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vim-android-binary-only
          path: vim-android-binary-only.tar.gz
