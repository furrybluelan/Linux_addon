name: Build Ultimate Static fstrim

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          # 补齐 autopoint 和 gettext，解决 Image 3 的问题
          sudo apt-get install -y autoconf automake libtool pkg-config bison flex wget tar file xz-utils build-essential gettext autopoint

      - name: Setup Bootlin Toolchain
        run: |
          # 使用最稳的 Bootlin 节点
          wget https://toolchains.bootlin.com/downloads/releases/toolchains/aarch64/tarballs/aarch64--musl--stable-2024.05-1.tar.xz
          tar -xf aarch64--musl--stable-2024.05-1.tar.xz
          echo "$(pwd)/aarch64--musl--stable-2024.05-1/bin" >> $GITHUB_PATH

      - name: Configure and Build
        run: |
          ./autogen.sh
          
          # 核心修正：添加 -fno-stack-protector 和 -no-pie 解决 Image 4 的链接错误
          export CC="aarch64-linux-gcc"
          export CFLAGS="-Os -static -fno-stack-protector -no-pie"
          export LDFLAGS="-static -no-pie"
          
          ./configure --host=aarch64-linux \
                      --disable-shared \
                      --enable-static \
                      --disable-all-programs \
                      --enable-fstrim \
                      --enable-libmount \
                      --enable-libblkid \
                      --enable-libuuid \
                      --without-python \
                      --without-systemd \
                      --without-udev \
                      --without-ncurses \
                      --without-cap-ng \
                      --disable-nls \
                      --disable-bash-completion
          
          # 编译时再次注入参数确保万无一失
          make fstrim CFLAGS="-Os -static -fno-stack-protector" LDFLAGS="-static"
          
          # 剥离符号信息
          aarch64-linux-strip --strip-all fstrim
          
          echo "Build Success! Verification:"
          file fstrim
          readelf -d fstrim | grep "NEEDED" || echo "No dynamic dependencies - Truly Static!"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fstrim-ultimate-static
          path: fstrim
