name: Build Ultimate Static fstrim

on:
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          # 安装构建必需的基础工具
          sudo apt-get install -y autoconf automake libtool pkg-config gettext bison flex wget tar file xz-utils build-essential

      - name: Setup Bootlin Toolchain
        run: |
          # 放弃不稳定的 musl.cc，改用业界最强、极其稳定的 Bootlin 嵌入式交叉工具链
          wget https://toolchains.bootlin.com/downloads/releases/toolchains/aarch64/tarballs/aarch64--musl--stable-2024.05-1.tar.xz
          tar -xf aarch64--musl--stable-2024.05-1.tar.xz
          
          # 将解压后的工具链 bin 目录加入全局环境变量
          TOOLCHAIN_BIN="$(pwd)/aarch64--musl--stable-2024.05-1/bin"
          echo "$TOOLCHAIN_BIN" >> $GITHUB_PATH

      - name: Configure and Build
        run: |
          ./autogen.sh
          
          # Bootlin 工具链的标准前缀是 aarch64-linux-
          export CC="aarch64-linux-gcc"
          # 极简且正确的静态编译参数
          export CFLAGS="-Os -static"
          export LDFLAGS="-static"
          
          # 运行配置脚本，--host 指定目标架构，全面禁用不需要的组件和容易报错的 NLS
          ./configure --host=aarch64-linux \
                      --disable-shared \
                      --enable-static \
                      --disable-all-programs \
                      --enable-fstrim \
                      --enable-libmount \
                      --enable-libblkid \
                      --enable-libuuid \
                      --without-python \
                      --without-systemd \
                      --without-udev \
                      --without-ncurses \
                      --without-cap-ng \
                      --disable-nls \
                      --disable-bash-completion
          
          # 精准只编译 fstrim
          make fstrim LDFLAGS="-static"
          
          # 剥离多余的调试符号，大幅度减小文件体积
          aarch64-linux-strip --strip-all fstrim
          
          # 输出验证信息
          echo "========================================"
          file fstrim
          echo "========================================"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fstrim-android-aarch64-bootlin-static
          path: fstrim
