name: Build static nmap for Android (arm64) - Most Stable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y make wget curl

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip android-ndk-r25c-linux.zip
          echo "NDK_PATH=${PWD}/android-ndk-r25c" >> $GITHUB_ENV

      - name: Set up NDK environment
        run: |
          TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
          TARGET=aarch64-linux-android
          API=21
          BIN_DIR=$TOOLCHAIN/bin
          SYSROOT=$TOOLCHAIN/sysroot

          echo "$BIN_DIR" >> $GITHUB_PATH

          echo "TARGET=$TARGET" >> $GITHUB_ENV
          echo "API=$API" >> $GITHUB_ENV
          echo "CC=$BIN_DIR/clang --target=$TARGET$API --sysroot=$SYSROOT" >> $GITHUB_ENV
          echo "CXX=$BIN_DIR/clang++ --target=$TARGET$API --sysroot=$SYSROOT" >> $GITHUB_ENV
          echo "AR=$BIN_DIR/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB=$BIN_DIR/llvm-ranlib" >> $GITHUB_ENV
          echo "STRIP=$BIN_DIR/llvm-strip" >> $GITHUB_ENV
          echo "TOOLCHAIN=$TOOLCHAIN" >> $GITHUB_ENV

      # --- 获取最新版本号（带可靠的后备版本）---
      - name: Get latest OpenSSL version
        id: openssl
        run: |
          VERSION=$(curl -s https://www.openssl.org/source/ | grep -oP 'openssl-3\.0\.\d+' | sort -V | tail -n1 | sed 's/openssl-//')
          echo "version=${VERSION:-3.0.13}" >> $GITHUB_OUTPUT

      - name: Get latest libpcap version
        id: libpcap
        run: |
          VERSION=$(curl -s https://www.tcpdump.org/release/ | grep -oP 'libpcap-1\.10\.\d+' | sort -V | tail -n1 | sed 's/libpcap-//')
          echo "version=${VERSION:-1.10.4}" >> $GITHUB_OUTPUT

      - name: Get latest Lua version
        id: lua
        run: |
          VERSION=$(curl -s https://www.lua.org/ftp/ | grep -oP 'lua-5\.4\.\d+' | sort -V | tail -n1 | sed 's/lua-//')
          echo "version=${VERSION:-5.4.6}" >> $GITHUB_OUTPUT

      - name: Get latest nmap version
        id: nmap
        run: |
          VERSION=$(curl -s https://nmap.org/dist/ | grep -oP 'nmap-7\.\d+' | sort -V | tail -n1 | sed 's/nmap-//')
          echo "version=${VERSION:-7.95}" >> $GITHUB_OUTPUT

      # --- 编译 OpenSSL（静态）---
      - name: Build OpenSSL (static)
        run: |
          export ANDROID_NDK_ROOT=$NDK_PATH
          export PATH=$TOOLCHAIN/bin:$PATH

          VER=${{ steps.openssl.outputs.version }}
          wget https://www.openssl.org/source/openssl-$VER.tar.gz
          tar xf openssl-$VER.tar.gz
          cd openssl-$VER
          ./Configure android-arm64 -D__ANDROID_API__=$API --prefix=$PWD/install no-shared
          make -j$(nproc)
          make install_sw
          echo "OPENSSL_DIR=$PWD/install" >> $GITHUB_ENV
          cd ..

      # --- 编译 libpcap（静态）---
      - name: Build libpcap (static)
        run: |
          VER=${{ steps.libpcap.outputs.version }}
          wget https://www.tcpdump.org/release/libpcap-$VER.tar.gz
          tar xf libpcap-$VER.tar.gz
          cd libpcap-$VER
          ./configure --host=$TARGET --prefix=$PWD/install --disable-shared --enable-static
          make -j$(nproc)
          make install
          echo "LIBPCAP_DIR=$PWD/install" >> $GITHUB_ENV
          cd ..

      # --- 编译 Lua（静态）- 手动编译所有源文件 ---
      - name: Build Lua (static)
        run: |
          VER=${{ steps.lua.outputs.version }}
          wget https://www.lua.org/ftp/lua-$VER.tar.gz
          tar xf lua-$VER.tar.gz
          cd lua-$VER/src

          # 编译所有 .c 文件为目标文件
          for f in *.c; do
            $CC -fPIE -O2 -c $f
          done

          # 创建静态库
          $AR rcu liblua.a *.o
          $RANLIB liblua.a

          # 安装头文件和库
          mkdir -p $PWD/../install/include $PWD/../install/lib
          cp *.h $PWD/../install/include/
          cp liblua.a $PWD/../install/lib/

          echo "LUA_DIR=$PWD/../install" >> $GITHUB_ENV
          cd ../..

      # --- 下载 nmap 源码 ---
      - name: Download nmap source
        run: |
          VER=${{ steps.nmap.outputs.version }}
          wget https://nmap.org/dist/nmap-$VER.tar.bz2
          tar xf nmap-$VER.tar.bz2
          echo "NMAP_SRC_DIR=$PWD/nmap-$VER" >> $GITHUB_ENV

      # 删除内部 liblua 目录（我们已经使用外部 lua）
      - name: Remove internal liblua
        run: |
          rm -rf $NMAP_SRC_DIR/liblua

      - name: Configure nmap (static, minimal features)
        run: |
          cd $NMAP_SRC_DIR
          export CPPFLAGS="-I$OPENSSL_DIR/include -I$LIBPCAP_DIR/include -I$LUA_DIR/include"
          export LDFLAGS="-L$OPENSSL_DIR/lib -L$LIBPCAP_DIR/lib -L$LUA_DIR/lib"
          # 预设置交叉编译缓存变量，避免 configure 测试失败
          export ac_cv_func_malloc_0_nonnull=yes
          export ac_cv_func_realloc_0_nonnull=yes
          export lt_cv_sys_max_cmd_len=32768
          export CFLAGS="-fPIE -O2"

          ./configure \
            --host=$TARGET \
            --build=x86_64-linux-gnu \
            --prefix=$PWD/install \
            --without-zenmap \
            --without-nmap-update \
            --without-nping \
            --without-libssh \
            --without-pcre \
            --without-liblinear \
            --with-pcap=linux \
            --with-openssl=$OPENSSL_DIR \
            --with-liblua=$LUA_DIR \
            --with-libpcap=$LIBPCAP_DIR \
            --enable-static \
            --disable-shared

      # 删除内部可能仍被尝试编译的库目录，彻底避免它们干扰
      - name: Remove internal unused libraries
        run: |
          rm -rf $NMAP_SRC_DIR/libpcre
          rm -rf $NMAP_SRC_DIR/libssh2
          rm -rf $NMAP_SRC_DIR/liblinear
          rm -rf $NMAP_SRC_DIR/nping

      - name: Compile nmap (static) with verbose output
        run: |
          cd $NMAP_SRC_DIR
          # 使用单线程编译，便于看清错误
          make -j1 V=1 LDFLAGS="$LDFLAGS -static -pie -Wl,-z,max-page-size=0x1000 -Wl,-z,common-page-size=0x1000" LIBS="-llua -lpcap -lssl -lcrypto -lm" || {
            echo "=== Compilation failed. Displaying last 50 lines of config.log and make output ==="
            tail -50 config.log
            exit 1
          }
          make install

      - name: Strip and package
        run: |
          cd $NMAP_SRC_DIR/install/bin
          $STRIP nmap
          echo "=== Checking linked libraries (should only show system libs) ==="
          readelf -d nmap | grep NEEDED || true
          tar -czf $GITHUB_WORKSPACE/nmap-android-static.tar.gz nmap

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nmap-android-static
          path: nmap-android-static.tar.gz
